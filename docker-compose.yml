version: '3.8'
services:
  moodle-dr:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - /var/lib/moodle-dr:/var/lib/moodle-dr
      - /etc/moodle-dr:/etc/moodle-dr:ro
      - ${SSH_KEY_PATH:-/root/.ssh/moodle_rsync_ed25519}:/app/ssh_key:ro
    environment:
      - AZURE_VM_IP=${AZURE_VM_IP:-}
      - AZURE_VM_USER=${AZURE_VM_USER:-moodlesync}
      - SSH_KEY_PATH=/app/ssh_key
      - SOURCE_PATH=${SOURCE_PATH:-/var/www/Azure-MoodleData/}
      - TARGET_PATH=${TARGET_PATH:-/moodledata/}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - moodle-dr
    restart: unless-stopped
